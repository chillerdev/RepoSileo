<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b1020">
  <title>Sileo Repository</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="hero">
    <div class="logo">S</div>
    <p class="eyebrow">APT REPOSITORY</p>
    <h1 id="repo-name">Sileo Repository</h1>
    <p id="repo-description">Đang tải thông tin kho…</p>
    <div class="actions">
      <a id="add-sileo" class="primary" href="#">Thêm vào Sileo</a>
      <button id="copy-url" type="button">Sao chép URL</button>
    </div>
    <code id="repo-url"></code>
  </header>
  <main>
    <div class="heading"><h2>Ứng dụng trong repo</h2><span id="count">0 gói</span></div>
    <div id="packages" class="grid"><p class="empty">Đang đọc danh sách…</p></div>
  </main>
  <footer>Được tạo tự động từ metadata của các file .deb</footer>
  <script src="assets/app.js" defer></script>
</body>
</html>
